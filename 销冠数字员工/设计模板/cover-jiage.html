<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080,height=1920">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

:root {
  --navy: #061830;
  --navy-light: #0A1A35;
  --gold: #D7BB94;
  --gold-bright: #E9D1AB;
  --white: #F5F0E8;
  --text-muted: #8A9BB5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px; height: 1920px;
  background: var(--navy);
  font-family: 'Noto Sans SC', sans-serif;
  overflow: hidden;
  position: relative;
}

/* Background ambient glow */
body::before {
  content: '';
  position: absolute;
  top: -20%; left: -10%;
  width: 120%; height: 50%;
  background: radial-gradient(ellipse at 50% 30%, rgba(215,187,148,0.08) 0%, transparent 70%);
}

/* Grid texture */
body::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(215,187,148,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(215,187,148,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* Main scene card */
.scene {
  position: absolute;
  top: 280px;
  left: 60px; right: 60px;
  height: 1000px;
  border-radius: 32px;
  overflow: hidden;
  border: 1px solid rgba(215,187,148,0.15);
  box-shadow: 
    0 0 80px rgba(215,187,148,0.06),
    inset 0 1px 0 rgba(255,255,255,0.03);
}

.scene-bg {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.7) saturate(1.1);
}

/* Gradient overlays */
.scene-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(6,24,48,0.6) 0%,
    rgba(6,24,48,0.2) 40%,
    rgba(6,24,48,0.7) 100%
  );
}

/* Left shop label */
.shop-label {
  position: absolute;
  top: 520px; left: 120px;
  background: rgba(6,24,48,0.85);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(215,187,148,0.2);
  border-radius: 20px;
  padding: 16px 28px;
  color: var(--gold);
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.05em;
}

.shop-label.queue {
  top: 420px; left: 120px;
}
.shop-label.queue::after {
  content: '📋 排队中...';
  display: block;
  font-size: 20px; color: var(--text-muted);
  margin-top: 4px;
}

.shop-label.empty {
  top: 420px; right: 120px; left: auto;
}
.shop-label.empty::after {
  content: '🪑 空无一人';
  display: block;
  font-size: 20px; color: var(--text-muted);
  margin-top: 4px;
}

/* Vs divider */
.vs-divider {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), #A8896A);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: 900;
  color: var(--navy);
  box-shadow: 0 8px 32px rgba(215,187,148,0.3);
}

/* Main title */
.title-block {
  position: absolute;
  top: 140px;
  left: 0; right: 0;
  text-align: center;
}

.title-block .eyebrow {
  display: inline-block;
  background: rgba(215,187,148,0.12);
  border: 1px solid rgba(215,187,148,0.25);
  border-radius: 100px;
  padding: 8px 24px;
  font-size: 22px;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.title-block h1 {
  font-size: 72px;
  font-weight: 900;
  color: var(--white);
  letter-spacing: 0.03em;
  line-height: 1.15;
  text-shadow: 0 4px 32px rgba(0,0,0,0.5);
}

.title-block h1 .gold { color: var(--gold); }

/* Bottom brand bar */
.brand-bar {
  position: absolute;
  bottom: 80px;
  left: 60px; right: 60px;
  height: 120px;
  background: rgba(10,26,53,0.9);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(215,187,148,0.12);
  border-radius: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 48px;
}

.brand-bar .account {
  font-size: 32px;
  font-weight: 700;
  color: var(--white);
}

.brand-bar .account span {
  color: var(--gold);
  font-size: 20px;
  font-weight: 400;
  display: block;
}

.brand-bar .cta {
  background: linear-gradient(135deg, var(--gold), #A8896A);
  color: var(--navy);
  border: none;
  border-radius: 100px;
  padding: 18px 48px;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 0.05em;
  box-shadow: 0 4px 24px rgba(215,187,148,0.25);
}
</style>
</head>
<body>
  <div class="title-block">
    <div class="eyebrow">佳哥 · 行业诊断</div>
    <h1>排队<span class="gold">的</span>店<br>vs<br>空<span class="gold">的</span>店</h1>
  </div>

  <div class="scene">
    <!-- Placeholder: real image would go here -->
    <div style="width:100%;height:100%;background:linear-gradient(180deg,#0A1A35 0%,#061830 50%,#0D2038 100%);position:relative;">
      <!-- Simulated street scene with CSS -->
      <div class="scene-overlay"></div>
      
      <!-- Left: queuing shop -->
      <div style="position:absolute;top:200px;left:80px;width:400px;height:600px;background:rgba(10,26,53,0.8);border-radius:20px;border:1px solid rgba(215,187,148,0.15);display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <div style="font-size:80px;">🏪</div>
        <div style="color:var(--gold);font-size:32px;font-weight:700;margin-top:16px;">排队的店</div>
        <!-- Queue of people -->
        <div style="display:flex;gap:8px;margin-top:24px;">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--gold);opacity:0.8;"></div>
          <div style="width:32px;height:32px;border-radius:50%;background:var(--gold);opacity:0.6;"></div>
          <div style="width:32px;height:32px;border-radius:50%;background:var(--gold);opacity:0.4;"></div>
          <div style="width:32px;height:32px;border-radius:50%;background:var(--gold);opacity:0.2;"></div>
        </div>
      </div>
      
      <!-- Vs -->
      <div class="vs-divider">VS</div>
      
      <!-- Right: empty shop -->
      <div style="position:absolute;top:200px;right:80px;width:400px;height:600px;background:rgba(10,26,53,0.8);border-radius:20px;border:1px solid rgba(215,187,148,0.15);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0.5;">
        <div style="font-size:80px;">🏚️</div>
        <div style="color:var(--text-muted);font-size:32px;font-weight:700;margin-top:16px;">空着的店</div>
      </div>
    </div>
  </div>

  <div class="brand-bar">
    <div class="account">
      佳哥公域获客
      <span>抖音号：43237761741</span>
    </div>
    <div class="cta">评论"获客"</div>
  </div>
</body>
</html>
