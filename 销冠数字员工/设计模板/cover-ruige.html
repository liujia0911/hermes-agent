<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080,height=1920">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

:root {
  --navy: #061830;
  --navy-light: #0A1A35;
  --gold: #D7BB94;
  --gold-bright: #E9D1AB;
  --white: #F5F0E8;
  --text-muted: #8A9BB5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px; height: 1920px;
  background: var(--navy);
  font-family: 'Noto Sans SC', sans-serif;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: absolute;
  top: -10%; left: 0;
  width: 100%; height: 60%;
  background: radial-gradient(ellipse at 50% 40%, rgba(215,187,148,0.06) 0%, transparent 70%);
}

body::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(215,187,148,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(215,187,148,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.title-block {
  position: absolute;
  top: 120px;
  left: 0; right: 0;
  text-align: center;
}

.title-block .eyebrow {
  display: inline-block;
  background: rgba(215,187,148,0.12);
  border: 1px solid rgba(215,187,148,0.25);
  border-radius: 100px;
  padding: 8px 24px;
  font-size: 22px;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 0.15em;
  margin-bottom: 20px;
}

.title-block h1 {
  font-size: 62px;
  font-weight: 900;
  color: var(--white);
  letter-spacing: 0.03em;
  line-height: 1.2;
  text-shadow: 0 4px 32px rgba(0,0,0,0.5);
}

.title-block h1 .gold { color: var(--gold); }
.title-block h1 .red { color: #E05555; }

/* Calculator card */
.calc-card {
  position: absolute;
  top: 560px;
  left: 80px; right: 80px;
  background: var(--navy-light);
  border: 1px solid rgba(215,187,148,0.15);
  border-radius: 32px;
  padding: 48px;
  box-shadow: 0 0 60px rgba(215,187,148,0.04);
}

.calc-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0;
  border-bottom: 1px solid rgba(215,187,148,0.08);
}

.calc-row:last-child { border-bottom: none; }

.calc-row .label {
  font-size: 28px;
  color: var(--text-muted);
  font-weight: 400;
}

.calc-row .value {
  font-size: 36px;
  font-weight: 900;
  color: var(--white);
}

.calc-row .value.gold { color: var(--gold); }
.calc-row .value.red { 
  color: #E05555; 
  text-decoration: line-through;
  text-decoration-color: rgba(224,85,85,0.5);
}

.calc-row .value.highlight {
  background: linear-gradient(135deg, var(--gold), #A8896A);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: 42px;
}

/* Arrow annotation */
.arrow-note {
  position: absolute;
  top: 1020px;
  right: 120px;
  display: flex;
  align-items: center;
  gap: 16px;
  color: var(--gold-bright);
  font-size: 24px;
  font-weight: 700;
}

.arrow-note .arrow {
  font-size: 48px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: translateX(0); opacity: 1; }
  50% { transform: translateX(8px); opacity: 0.6; }
}

/* Bottom bar */
.brand-bar {
  position: absolute;
  bottom: 80px;
  left: 60px; right: 60px;
  height: 120px;
  background: rgba(10,26,53,0.9);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(215,187,148,0.12);
  border-radius: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 48px;
}

.brand-bar .account {
  font-size: 32px;
  font-weight: 700;
  color: var(--white);
}

.brand-bar .account span {
  color: var(--gold);
  font-size: 20px;
  font-weight: 400;
  display: block;
}

.brand-bar .cta {
  background: linear-gradient(135deg, var(--gold), #A8896A);
  color: var(--navy);
  border: none;
  border-radius: 100px;
  padding: 18px 48px;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 0.05em;
  box-shadow: 0 4px 24px rgba(215,187,148,0.25);
}
</style>
</head>
<body>
  <div class="title-block">
    <div class="eyebrow">睿哥 · 趋势预判</div>
    <h1><span class="red">8个销售</span><br>跑不过<br><span class="gold">一条视频</span></h1>
  </div>

  <div class="calc-card">
    <div class="calc-row">
      <div class="label">8个销售 · 月成本</div>
      <div class="value red">￥40,000</div>
    </div>
    <div class="calc-row">
      <div class="label">月拜访客户上限</div>
      <div class="value">~100家</div>
    </div>
    <div class="calc-row">
      <div class="label" style="color:var(--gold);">1条视频 · 月成本</div>
      <div class="value gold">~￥500</div>
    </div>
    <div class="calc-row">
      <div class="label" style="color:var(--gold);">曝光量</div>
      <div class="value highlight">25,000+</div>
    </div>
  </div>

  <div class="arrow-note">
    <span>视频不下班</span>
    <span class="arrow">→</span>
  </div>

  <div class="brand-bar">
    <div class="account">
      睿哥公域获客
      <span>抖音 + 视频号</span>
    </div>
    <div class="cta">评论"获客"</div>
  </div>
</body>
</html>
